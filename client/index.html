<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Molt-Biosphere</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Outfit', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); } 50% { box-shadow: 0 0 40px rgba(16, 185, 129, 0.6); } }
    .glow { animation: pulse-glow 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const API = 'http://100.116.4.109:8002';

    const App = () => {
      const [atp, setAtp] = useState(100);
      const [isSleeping, setIsSleeping] = useState(false);
      const [activeTools, setActiveTools] = useState([]);
      const [wisdomCount, setWisdomCount] = useState(42);
      const [logs, setLogs] = useState([]);
      const [loading, setLoading] = useState(true);

      const fetchStatus = useCallback(async () => {
        try {
          const res = await fetch(`${API}/atp`);
          const data = await res.json();
          setAtp(data.atp);
        } catch (e) { console.error(e); }
        setLoading(false);
      }, []);

      useEffect(() => {
        fetchStatus();
        const i = setInterval(fetchStatus, 3000);
        return () => clearInterval(i);
      }, [fetchStatus]);

      useEffect(() => {
        const h = setInterval(async () => {
          try {
            const res = await fetch(`${API}/hormones`);
            const data = await res.json();
            if (data.signals?.length) {
              // Get last 3 signals to catch recent activity
              const recent = data.signals.slice(-3);
              recent.forEach(latest => {
                if (latest.type === 'atp_change') {
                  setAtp(latest.payload.new_balance);
                  const reason = latest.payload.reason || 'balance change';
                  const delta = latest.payload.delta;
                  const type2 = delta > 0 ? 'success' : 'info';
                  const msg2 = `ATP: ${delta > 0 ? '+' : ''}${delta} (${reason})`;
                  setLogs(prev => [{ msg: msg2, type: type2, time: new Date().toLocaleTimeString() }, ...prev].slice(0, 8));
                }
                if (latest.type === 'injection_detected') {
                  setLogs(prev => [{ msg: `🛡️ Macrophage blocked injection`, type: 'error', time: new Date().toLocaleTimeString() }, ...prev].slice(0, 8));
                }
                if (latest.type === 'tool_blocked') {
                  setLogs(prev => [{ msg: `⚠️ ${latest.payload.tool} blocked (ATP: ${latest.payload.atp})`, type: 'error', time: new Date().toLocaleTimeString() }, ...prev].slice(0, 8));
                }
                if (latest.type === 'reward_granted') {
                  setLogs(prev => [{ msg: `🌱 +${latest.payload.amount} ATP (${latest.payload.reason})`, type: 'success', time: new Date().toLocaleTimeString() }, ...prev].slice(0, 8)]);
                }
              });
            }
          } catch (e) { console.error('Hormone fetch error:', e); }
        }, 2000);
        return () => clearInterval(h);
      }, []);

      const executeClawTool = async (toolName) => {
        if (atp < 25) {
          setLogs(prev => [{ msg: `ATP LOW: Suppressing ${toolName}.`, type: 'error', time: new Date().toLocaleTimeString() }, ...prev].slice(0, 8));
          return;
        }
        
        setAtp(prev => prev - 25);
        const newTool = { id: Date.now(), name: toolName, status: 'Running' };
        setActiveTools(prev => [...prev, newTool]);
        setLogs(prev => [{ msg: `Macrophage validated: ${toolName}. -25 ATP.`, type: 'success', time: new Date().toLocaleTimeString() }, ...prev].slice(0, 8));

        setTimeout(() => {
          setActiveTools(prev => prev.filter(t => t.id !== newTool.id));
          setAtp(prev => Math.min(200, prev + 10));
          setLogs(prev => [{ msg: `Tool ${toolName} complete. +10 ATP`, type: 'info', time: new Date().toLocaleTimeString() }, ...prev].slice(0, 8));
        }, 3000);
      };

      const triggerREM = async () => {
        setIsSleeping(true);
        setLogs(prev => [{ msg: "Initiating REM Sleep...", type: 'sleep', time: new Date().toLocaleTimeString() }, ...prev].slice(0, 8));
        
        try {
          await fetch(`${API}/crystallize`, { method: 'POST' });
        } catch (e) {}
        
        setTimeout(() => {
          setIsSleeping(false);
          setWisdomCount(w => w + 3);
          setAtp(200);
          setLogs(prev => [{ msg: "REM Complete: Knowledge Graph updated.", type: 'success', time: new Date().toLocaleTimeString() }, ...prev].slice(0, 8));
        }, 4000);
      };

      if (loading) return <div className="min-h-screen bg-zinc-950 flex items-center justify-center"><p className="text-zinc-500 font-medium">Connecting to Molt-Biosphere...</p></div>;

      return (
        <div className={`min-h-screen p-4 sm:p-6 transition-all duration-1000 ${isSleeping ? 'bg-indigo-950 text-indigo-300' : 'bg-zinc-950 text-zinc-100'}`}>
          <div className="max-w-5xl mx-auto">
            
            <header className="flex justify-between items-center mb-8 border-b border-zinc-800 pb-6">
              <div className="flex items-center gap-4">
                <div className="bg-emerald-600 p-2 rounded-lg">
                  <svg className="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0 1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 5.28.55"/></svg>
                </div>
                <div>
                  <h1 className="text-2xl font-bold tracking-tighter">MOLT-BIOSPHERE</h1>
                  <p className="text-xs text-zinc-500 font-mono uppercase">OpenClaw Engine + Bio-OS Core</p>
                </div>
              </div>
              <div className="flex gap-4">
                <div className="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-xl flex items-center gap-3">
                  <svg className="text-yellow-500 w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                  <span className="font-mono font-bold">{atp} <span className="text-[10px] text-zinc-500">ATP</span></span>
                </div>
                <button onClick={triggerREM} disabled={isSleeping} className="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 transition-all disabled:opacity-50">
                  <svg className={`w-4 h-4 ${isSleeping ? 'animate-pulse' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                  {isSleeping ? 'Sleeping' : 'REM'}
                </button>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* Left: Macrophage */}
              <div className="bg-zinc-900/50 border border-zinc-800 rounded-2xl p-6">
                <h3 className="text-xs font-black text-zinc-500 uppercase mb-6 flex items-center gap-2">
                  <svg className="w-4 h-4 text-emerald-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                  Macrophage Sentinel
                </h3>
                <div className="space-y-4">
                  <button onClick={() => executeClawTool('browser_use')} className="w-full py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm font-bold flex items-center justify-center gap-2 border border-zinc-700">
                    <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    Open Browser
                  </button>
                  <button onClick={() => executeClawTool('bash_execute')} className="w-full py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm font-bold flex items-center justify-center gap-2 border border-zinc-700">
                    <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                    Run Bash Script
                  </button>
                  <div className="mt-8 p-4 bg-emerald-500/5 border border-emerald-500/20 rounded-xl">
                    <p className="text-[10px] text-emerald-400 font-bold uppercase mb-2">Immune Status</p>
                    <p className="text-xs text-zinc-400 leading-relaxed italic">Digesting indirect prompt injections from lane-0.</p>
                  </div>
                </div>
              </div>

              {/* Center: Bloodstream */}
              <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 flex flex-col h-[400px]">
                <h3 className="text-xs font-black text-zinc-500 uppercase mb-4 flex items-center gap-2">
                  <svg className="w-4 h-4 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                  Hormonal Bloodstream
                </h3>
                <div className="flex-grow overflow-y-auto space-y-3 font-mono">
                  {logs.map((log, i) => (
                    <div key={i} className={`text-[10px] p-2 rounded border ${
                      log.type === 'success' ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' :
                      log.type === 'error' ? 'bg-red-500/10 border-red-500/20 text-red-400' :
                      log.type === 'sleep' ? 'bg-indigo-500/20 border-indigo-500/30 text-indigo-200' :
                      'bg-zinc-800 border-zinc-700 text-zinc-400'
                    }`}>
                      <span className="opacity-50">[{log.time}]</span> {log.msg}
                    </div>
                  ))}
                </div>
                {activeTools.length > 0 && (
                  <div className="mt-4 pt-4 border-t border-zinc-800">
                    <p className="text-[10px] text-zinc-500 uppercase font-bold mb-2">Active Metabolisms</p>
                    {activeTools.map(tool => (
                      <div key={tool.id} className="flex items-center justify-between text-xs text-emerald-400 animate-pulse">
                        <span>{tool.name}</span>
                        <svg className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Right: Knowledge */}
              <div className="space-y-6">
                <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl">
                  <h3 className="text-xs font-black text-zinc-500 uppercase mb-4 flex items-center gap-2">
                    <svg className="w-4 h-4 text-purple-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                    Neocortex
                  </h3>
                  <div className="flex justify-between items-center">
                    <span className="text-2xl font-bold">{wisdomCount}</span>
                    <span className="text-[10px] text-zinc-500 uppercase font-bold">Wisdom Triplets</span>
                  </div>
                  <div className="mt-4 h-1 bg-zinc-800 rounded-full overflow-hidden">
                    <div className="h-full bg-purple-500" style={{ width: `${(wisdomCount / 100) * 100}%` }}></div>
                  </div>
                </div>

                <div className="bg-indigo-600 text-white p-6 rounded-2xl shadow-xl shadow-indigo-950/50">
                  <div className="flex items-center gap-2 mb-4">
                    <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                    <span className="text-[10px] font-bold uppercase">Genetic Strategy</span>
                  </div>
                  <p className="text-xs leading-relaxed opacity-90">
                    OpenClaw lane priority: <strong>Adaptive Security</strong>.<br/>
                    Metabolism: <strong>High</strong>.<br/>
                    Next REM in 4 hours.
                  </p>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
